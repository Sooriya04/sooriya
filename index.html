<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sooriya@dev ~ terminal</title>
    <meta name="description" content="Sooriya's Interactive Terminal Portfolio" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>

    <!-- ─── TOP MENU BAR ─── -->
    <nav class="top-bar">
        <div class="top-bar-left">
            <div class="top-bar-dots">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <span class="top-bar-title"><span>sooriya</span>@dev — bash</span>
        </div>
        <div class="top-bar-right">
            <span class="top-bar-time" id="clock">--:--:--</span>
        </div>
    </nav>

    <!-- ─── TERMINAL CONTAINER ─── -->
    <div class="terminal-container" id="terminal-wrapper">
        <div id="terminal-output">
            <!-- Boot Sequence and specific command outputs will go here -->
        </div>

        <!-- Live input prompt -->
        <div class="input-line">
            <span class="prompt"><span class="user">sooriya@dev</span>:<span class="path">~</span><span
                    class="symbol">$</span></span>
            <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus />
        </div>
    </div>

    <!-- ─── STATUS BAR ─── -->
    <div class="status-bar">
        <span class="status-mode">INSERT</span>
        <span>sooriya@dev:~/portfolio</span>
        <span class="status-right">
            <span>UTF-8</span>
            <span>Type 'help' for commands</span>
        </span>
    </div>

    <script src="assets/script/index.js"></script>
</body>

</html>
